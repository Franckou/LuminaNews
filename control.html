<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Lumina</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial; }
        button { width: 90%; height: 200px; background: red; color: white; font-size: 25px; border-radius: 20px; border: none; font-weight: bold; }
        button:active { background: darkred; transform: scale(0.98); }
    </style>
</head>
<body>
    <button onclick="disparar()">¡LANZAR NOTICIA!</button>
    <script>
        function disparar() {
            fetch('/.netlify/functions/trigger-noti', { method: 'POST' })
            .then(res => console.log("Señal enviada"))
            .catch(err => alert("Error: " + err));
        }
    </script>
</body>
</html>
